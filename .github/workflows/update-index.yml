name: Update F-Droid Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install F-Droid server tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apksigner
          pip3 install fdroidserver

      - name: Fetch APKs from releases
        run: |
          python3 scripts/fetch_apks.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure keystore
        run: |
          echo '${{ secrets.FDROID_KEYSTORE_B64 }}' | base64 -d > keystore.jks
          # Add keystore config to config.yml
          cat >> config.yml << EOF
          keystore: keystore.jks
          repo_keyalias: ${{ secrets.FDROID_KEY_ALIAS }}
          keystorepass: ${{ secrets.FDROID_KEYSTORE_PASS }}
          keypass: ${{ secrets.FDROID_KEY_PASS }}
          EOF

      - name: Run F-Droid update
        run: |
          fdroid update --create-metadata --pretty

      - name: Patch index with external URLs
        run: |
          python3 scripts/patch_index.py

      - name: Sign the patched index
        run: |
          fdroid signindex

      - name: Clean up keystore
        run: |
          rm keystore.jks
          # Remove keystore config from config.yml
          git checkout config.yml

      - name: Commit and push new index
        run: |
          # Remove APKs so they are not committed
          rm -f repo/*.apk
          
          git config --global user.name "F-Droid Bot"
          git config --global user.email "bot@example.com"
          git add index.* repo/ metadata/
          if ! git diff --staged --quiet; then
            git commit -m "Update F-Droid index"
            git push
          else
            echo "No changes to index."
          fi