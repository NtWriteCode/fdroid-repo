name: Update F-Droid Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch APKs from releases
        run: |
          python3 scripts/fetch_apks.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up F-Droid server tools
        uses: docker://registry.gitlab.com/fdroid/docker-executable-fdroidserver:latest
        with:
          args: bash -c "echo '${{ secrets.FDROID_KEYSTORE_B64 }}' | base64 -d > keystore.jks && fdroid update --create-metadata --pretty --keystore keystore.jks --keyalias '${{ secrets.FDROID_KEY_ALIAS }}' --storepass '${{ secrets.FDROID_KEYSTORE_PASS }}' --keypass '${{ secrets.FDROID_KEY_PASS }}' && python3 scripts/patch_index.py && fdroid signindex --keystore keystore.jks --keyalias '${{ secrets.FDROID_KEY_ALIAS }}' --storepass '${{ secrets.FDROID_KEYSTORE_PASS }}' --keypass '${{ secrets.FDROID_KEY_PASS }}' && rm keystore.jks"

      - name: Commit and push new index
        run: |
          # Remove APKs so they are not committed
          rm -f repo/*.apk
          
          git config --global user.name "F-Droid Bot"
          git config --global user.email "bot@example.com"
          git add index.* repo/ metadata/
          if ! git diff --staged --quiet; then
            git commit -m "Update F-Droid index"
            git push
          else
            echo "No changes to index."
          fi